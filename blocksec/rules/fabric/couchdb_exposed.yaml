id: FABRIC_COUCHDB_EXPOSED
name: CouchDB 端口暴露到宿主机
category: Fabric Configuration
severity: HIGH
version: "1.0.0"
target:
  type: docker_compose
  files:
    - docker-compose.yaml
    - docker-compose.yml
match:
  type: regex
  file_pattern: docker-compose*
  regex: '"\d+:5984"'
  case_sensitive: false
  negate: false
description: "CouchDB 端口被映射到宿主机所有接口（非 localhost），攻击者可通过 http://host:5984 直接访问状态数据库，查看或篡改账本数据。"
remediation: "删除 CouchDB 的外部端口映射，或将端口绑定到 127.0.0.1（如 127.0.0.1:5984:5984），仅允许 Peer 容器通过 Docker 内部网络访问。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/couchdb_as_state_database.html
false_positive_note: "如果 CouchDB 已配置认证（用户名/密码），风险降低但仍建议不暴露。绑定到 127.0.0.1 不属于高危。"
enabled: true
