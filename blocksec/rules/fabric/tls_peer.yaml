id: FABRIC_PEER_TLS_DISABLED
name: Peer 节点未开启 TLS
category: Fabric Configuration
severity: HIGH
version: "1.0.0"
target:
  type: env_or_yaml
  files:
    - docker-compose.yaml
    - docker-compose.yml
    - .env
    - core.yaml
match:
  type: key_value
  file_pattern: "*"
  key: CORE_PEER_TLS_ENABLED
  value: "false"
  case_sensitive: false
  negate: false
description: "Peer 节点未开启 TLS，节点间 gRPC 通信可能被中间人窃听或篡改。在生产环境中应始终开启 TLS。"
remediation: "将 CORE_PEER_TLS_ENABLED 设置为 true，并正确配置 CORE_PEER_TLS_CERT_FILE、CORE_PEER_TLS_KEY_FILE、CORE_PEER_TLS_ROOTCERT_FILE。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/enable_tls.html
false_positive_note: "测试网络或本地开发环境中 TLS 关闭可能是预期行为，请根据实际部署环境判断。"
enabled: true
