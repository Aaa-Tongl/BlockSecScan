id: FABRIC_RUNTIME_CONTAINER_ROOT
name: 容器以 root 用户运行
category: Fabric Runtime
severity: HIGH
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "Fabric 容器以 root 用户身份运行，存在容器逃逸和权限扩大风险。"
remediation: "在 Dockerfile 中使用 USER 指令切换到非 root 用户运行容器。"
references:
  - https://docs.docker.com/develop/develop-images/dockerfile_best-practices/#user
false_positive_note: "部分 Fabric 官方镜像默认以 root 运行，但在生产环境中应切换用户。"
enabled: true
---
id: FABRIC_RUNTIME_PRIVILEGED
name: 容器以特权模式运行
category: Fabric Runtime
severity: CRITICAL
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "Fabric 容器以 privileged 特权模式运行，拥有宿主机所有内核能力。"
remediation: "移除 --privileged 标志，使用 --cap-add 按需授予仅必要的能力。"
references:
  - https://docs.docker.com/engine/reference/run/#runtime-privilege-and-linux-capabilities
false_positive_note: "Fabric 测试网络中偶尔会使用 privileged 模式，生产环境禁止。"
enabled: true
---
id: FABRIC_RUNTIME_SENSITIVE_MOUNT
name: 容器挂载敏感宿主机目录
category: Fabric Runtime
severity: HIGH
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "Fabric 容器挂载了宿主机敏感路径，可能导致宿主机文件暴露或容器逃逸。"
remediation: "移除不必要的宿主机敏感目录挂载，仅保留必需的 volumes。"
references:
  - https://docs.docker.com/engine/security/
false_positive_note: ""
enabled: true
---
id: FABRIC_RUNTIME_HOST_NETWORK
name: 容器使用 host 网络模式
category: Fabric Runtime
severity: MEDIUM
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "容器使用 host 网络模式，与宿主机共享网络命名空间，丧失网络隔离。"
remediation: "切换到 bridge 网络模式，仅映射必要的端口。"
references:
  - https://docs.docker.com/network/host/
false_positive_note: ""
enabled: true
---
id: FABRIC_RUNTIME_COUCHDB_ACCESSIBLE
name: CouchDB 可被 HTTP 访问
category: Fabric Runtime
severity: HIGH
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "CouchDB 状态数据库可通过 HTTP 直接访问，攻击者可能查询或篡改账本数据。"
remediation: "配置 CouchDB 认证，或使用防火墙限制访问来源，绑定到 127.0.0.1。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/couchdb_as_state_database.html
false_positive_note: "如果 CouchDB 已配置认证（用户名/密码），风险降低。"
enabled: true
---
id: FABRIC_RUNTIME_PORT_OPEN
name: 端口开放但未识别服务
category: Fabric Runtime
severity: MEDIUM
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "端口可连接但未识别为已知的 Fabric 服务，可能是未授权服务或配置错误。"
remediation: "确认该端口运行的服务是否符合预期，是否需要对外暴露。"
references: []
false_positive_note: "可能是非 Fabric 服务监听此端口。"
enabled: true
---
id: FABRIC_RUNTIME_CERT_EXPIRY
name: 证书即将或已经过期
category: Fabric Runtime
severity: HIGH
version: "1.0.0"
target:
  type: fabric_runtime
  files: []
match:
  type: pattern
  file_pattern: "*"
description: "Fabric 节点的 TLS 证书已过期或即将过期，将导致节点间通信失败。"
remediation: "更新证书文件并重启相关 Fabric 服务。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/enable_tls.html
false_positive_note: ""
enabled: true
