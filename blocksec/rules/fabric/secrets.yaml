- id: FABRIC_PRIVATE_KEY_IN_REPO
  name: Private key file found in project
  category: fabric_config
  severity: HIGH
  confidence: HIGH
  target:
    file_globs:
      - "**/*_sk"
      - "**/*.pem"
      - "**/*.key"
  match:
    type: regex
    pattern: '-----BEGIN (RSA |EC |ENCRYPTED )?PRIVATE KEY-----'
    case_sensitive: false
  description: >
    A private key file was found in the project directory. Private keys
    should never be committed to version control or stored in project
    directories. This is a critical credential leak.
  remediation: >
    Remove the private key file immediately. Store keys in a secure key
    management system (HSM, vault). Add *_sk and *.key to .gitignore.
    Rotate any exposed keys.
  false_positive_note: >
    May be a test fixture with intentionally non-sensitive keys. Verify
    the key is not used in any real environment.
  tags:
    - secrets
    - private-key
    - crypto
  enabled: true

- id: FABRIC_PLAINTEXT_PASSWORD
  name: Plaintext password in configuration
  category: fabric_config
  severity: MEDIUM
  confidence: HIGH
  target:
    file_globs:
      - "**/*.yaml"
      - "**/*.yml"
      - "**/.env"
      - "**/docker-compose*.yml"
      - "**/docker-compose*.yaml"
  match:
    type: regex
    pattern: '(PASSWORD|PASSWD|SECRET|API_KEY)\s*[=:]\s*["\x27]?[^\s"''#]+'
    case_sensitive: false
  description: >
    A password or secret appears to be hardcoded in a configuration file.
    Hardcoded credentials can be leaked through version control, logs,
    or configuration sharing.
  remediation: >
    Use environment variable references (${VAR_NAME}) with a .env file
    excluded from version control. Consider using Docker secrets or a
    secrets manager.
  false_positive_note: >
    Variable references like ${PASSWORD} are not flagged. False positives
    may occur for passwords in comments or documentation — check manually.
  tags:
    - secrets
    - password
    - credentials
  enabled: true

- id: FABRIC_CERT_EXPIRED
  name: TLS certificate security issue
  category: fabric_config
  severity: HIGH
  confidence: HIGH
  target:
    file_globs:
      - "**/*.pem"
      - "**/*.crt"
      - "**/*.cert"
  match:
    type: certificate
  description: >
    A certificate in the project has security issues: it may be expired,
    expiring soon (within 30 days), or using weak cryptographic algorithms
    (SHA-1, RSA < 2048 bits, EC < 256 bits).
  remediation: >
    Renew expired certificates. Replace certificates using weak algorithms
    with SHA-256/RSA-2048 or stronger. Set up automated certificate renewal
    monitoring.
  tags:
    - certificate
    - crypto
    - expiry
  enabled: true
