id: FABRIC_ORDERER_TLS_DISABLED
name: Orderer 节点未开启 TLS
category: Fabric Configuration
severity: HIGH
version: "1.0.0"
target:
  type: env_or_yaml
  files:
    - docker-compose.yaml
    - docker-compose.yml
    - .env
    - orderer.yaml
match:
  type: key_value
  file_pattern: "*"
  key: ORDERER_GENERAL_TLS_ENABLED
  value: "false"
  case_sensitive: false
  negate: false
description: "Orderer 排序节点未开启 TLS，排序服务通信可能被窃听或篡改，影响整个通道的区块分发安全。"
remediation: "将 ORDERER_GENERAL_TLS_ENABLED 设置为 true，并配置对应的 TLS 证书路径。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/enable_tls.html
false_positive_note: "测试网络中可以关闭 TLS，生产环境必须开启。"
enabled: true
