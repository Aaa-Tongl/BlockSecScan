id: FABRIC_PLAINTEXT_PASSWORD
name: 配置文件中存在明文密码
category: Fabric Configuration
severity: MEDIUM
version: "1.0.0"
target:
  type: all_config
  files:
    - "*.yaml"
    - "*.yml"
    - ".env"
    - "*.json"
match:
  type: regex
  file_pattern: "*"
  regex: '(?i)(password|passwd|pwd|secret)\s*[:=]\s*["\u2018]?\S+["\u2019]?'
  case_sensitive: false
  negate: false
description: "配置文件中检测到可能的明文密码或密钥，密码泄露后攻击者可直接访问相关服务。"
remediation: "使用环境变量或密钥管理服务（如 HashiCorp Vault）存储密码，不在配置文件中硬编码。"
references:
  - https://hyperledger-fabric.readthedocs.io/en/latest/deployguide/limitations.html
false_positive_note: "示例配置或注释中的密码可能是占位符，请人工确认。"
enabled: true
